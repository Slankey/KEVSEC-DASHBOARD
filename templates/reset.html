<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KEVSEC // SET NEW CREDENTIALS</title>
<link href="https://fonts.googleapis.com/css2?family=Share Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050805;color:#39ff14;font-family:'Share Tech Mono',monospace;min-height:100vh;
  display:flex;align-items:center;justify-content:center}
.box{width:440px;border:1px solid #39ff14;padding:36px;background:#060d06}
h1{font-size:16px;letter-spacing:4px;margin-bottom:24px;color:#ffb700}
label{display:block;font-size:11px;letter-spacing:3px;color:#1a8c07;margin-bottom:6px;margin-top:16px}
input{width:100%;background:transparent;border:none;border-bottom:1px solid #1a8c07;
  color:#39ff14;font-family:'Share Tech Mono',monospace;font-size:14px;padding:8px 4px;outline:none}
button{width:100%;background:transparent;border:1px solid #39ff14;color:#39ff14;
  font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:4px;
  padding:12px;cursor:pointer;margin-top:20px}
button:hover{background:rgba(57,255,20,.1)}
</style>
</head>
<body>
<div class="box">
  <h1>🔑 ISSUE NEW AUTHENTICATION KEY</h1>
  <form method="POST">
    <label>NEW AUTHENTICATION KEY</label>
    <input type="password" name="password" placeholder="MIN 8 CHARACTERS" autofocus>
    <button type="submit">[ COMMIT NEW CREDENTIALS ]</button>
  </form>
</div>
</body>
</html>
